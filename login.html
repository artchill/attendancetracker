{% extends 'base.html' %}
{% block title %}Login - Attendance Tracker{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white p-8 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6 text-slate-800">Sign In</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" name="username" required
                   class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" name="password" required
                   class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-medium">
            Login
        </button>
    </form>
    <div class="mt-6 text-xs text-slate-500 border-t pt-4">
        <p class="font-semibold mb-1">Seeded credentials:</p>
        <p>Admin: <code>admin</code> / <code>admin123</code></p>
        <p>Employee: <code>jdoe</code> / <code>employee123</code></p>
    </div>
</div>
{% endblock %}
