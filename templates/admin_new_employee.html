{% extends 'base.html' %}
{% block title %}Add Employee - Admin{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-slate-800">Add New User</h1>
    <a href="{{ url_for('admin_employees') }}"
       class="text-sm text-slate-600 hover:text-slate-800">← Back to Employees</a>
</div>

<div class="bg-white rounded-lg shadow p-6 max-w-xl">
    <form method="POST" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    First Name <span class="text-red-600">*</span>
                </label>
                <input type="text" name="fname" required
                       value="{{ form_data.fname or '' }}"
                       class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Last Name <span class="text-red-600">*</span>
                </label>
                <input type="text" name="lname" required
                       value="{{ form_data.lname or '' }}"
                       class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
                Username <span class="text-red-600">*</span>
            </label>
            <input type="text" name="username" required
                   value="{{ form_data.username or '' }}"
                   placeholder="e.g. jdoe"
                   class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
                Role <span class="text-red-600">*</span>
            </label>
            <select name="role" required
                    class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                <option value="">-- Select role --</option>
                <option value="employee" {% if form_data.role == 'employee' %}selected{% endif %}>Employee</option>
                <option value="admin" {% if form_data.role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
                Password <span class="text-red-600">*</span>
            </label>
            <input type="password" name="password" required minlength="6"
                   placeholder="At least 6 characters"
                   class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
                Confirm Password <span class="text-red-600">*</span>
            </label>
            <input type="password" name="confirm_password" required minlength="6"
                   class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded font-medium">
                Create User
            </button>
            <a href="{{ url_for('admin_employees') }}"
               class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-5 py-2 rounded font-medium">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
